<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title class="tool-name">Orpheus</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200"/>
    <!-- Orpheus Primary Stylesheets -->
    <link rel="stylesheet" href="styles/themes.css"/>
    <link rel="stylesheet" href="styles/global.css"/>
    <link rel="stylesheet" href="styles/main.css"/>
    <link rel="stylesheet" href="styles/inputs.css"/>
    <link rel="stylesheet" href="styles/context_menu.css"/>
    <link rel="stylesheet" href="styles/widgets.css"/>
    <link rel="stylesheet" href="styles/lists.css"/>
    <!-- Widget Stylesheets -->
    <link rel="stylesheet" href="styles/table.css"/>
    <link rel="stylesheet" href="styles/graph.css"/>
    <link rel="stylesheet" href="styles/team-info.css"/>
    <link rel="stylesheet" href="styles/comments.css"/>
    <link rel="stylesheet" href="styles/match.css"/>
    <!-- Overrides -->
    <link rel="stylesheet" href="styles/overrides.css"/>
    <!-- Scripts -->
    <script src="deps/localForage/dist/localforage.js"></script>
    <script src="deps/mathjs/math.js"></script>
    <!-- This API key is only allowed for use on Orpheus. If you'd like to add Desmos to your fork of Orpheus or for use in your own project, please visit www.desmos.com/my-api or reach out to the Desmos Studio team at partnerships@desmos.com -->
    <script src="https://www.desmos.com/api/v1.11/calculator.js?apiKey=14470c380841448eae58c1b5f832477f" onload="
        // This way, we can check if desmos successfully loaded. If it loaded late (maybe due to slow internet or something), it can call the functions to initialize the things that require it.
        desmosReady = true;
        if (typeof onDesmosLoad !== 'undefined') {for (f of onDesmosLoad) f();}"
    onerror="
        desmosReady = false;
    "></script>
    <script src="scripts/uihandler.js" defer></script>
    <script src="scripts/widgets.js" defer></script>
    <script src="scripts/script.js" defer></script>
    <link rel="icon" type="image/x-icon" href="images/favicon.ico">
</head>
<body>
    <div class="sticky-header">
        <div class="horizontal-scroll" id="top-controls">
            <button id="top-control-data" class="dropdown-button">Data</button>
            <dialog class="top-control-dropdown" for="top-control-data">
                <div id="top-data-buttons">

                </div>

                <button id="top-mapping">Import mapping</button>
                <button id="top-mapping-download">Download saved mapping</button>
                <div class="dropdown-pause"></div>
                <div class="dropdown-pause"></div>
                <button id="top-load-event">Set Event</button>
                <div class="dropdown-pause"></div>
                <button id="top-clear-files">Delete Data & Mappings</button>
            </dialog>

            <button id="top-control-api" class="dropdown-button">APIs</button>
            <dialog class="top-control-dropdown" for="top-control-api">
                <button id="top-toggle-use-tbaevent">TheBlueAlliance Event API: </button>
                <button id="top-toggle-use-tbamatch">TheBlueAlliance Match API: </button>
                <button id="top-toggle-use-tbamedia">TheBlueAlliance Media API: </button>
                <button id="top-toggle-use-tbarank">TheBlueAlliance Event Ranking API: </button>
                <button id="top-toggle-use-desmos">Desmos API: </button>
                <button id="top-toggle-use-statbotics">Statbotics API: </button>
                <div class="dropdown-pause"></div>
                <button id="top-toggle-use-allapi">Enable All</button>
                <button id="top-toggle-use-noneapi">Disable All</button>
                <div id="top-last-saved-apis">Last Saved for offline use: </div>
            </dialog>

            <button id="top-control-preferences" class="dropdown-button">Preferences</button>
            <dialog class="top-control-dropdown" for="top-control-preferences">
                <button id="top-theme">Toggle Theme</button>
                <button id="top-projector">Projector Mode: Disabled</button>
                <button id="top-rounding">Rounding: 3 Digits</button>
                <div class="dropdown-pause"></div>
                <button id="top-graph-x">Graphs: Relative/Absolute</button>
                <button id="top-graph-display">Graphs: Points and Lines</button>
                <div class="dropdown-pause"></div>
                <button id="top-reset-preferences">Reset all to defaults</button>
                <button id="top-import-settings" disabled>Import State</button>
                <button id="top-export-settings" disabled>Export Current State</button>
            </dialog>

            <button id="top-control-lists" class="dropdown-button">Lists</button>
            <dialog class="top-control-dropdown" for="top-control-lists">
                <div class="list-edit"></div>
            </dialog>

            <button id="top-control-widgets" class="dropdown-button">Widgets</button>
            <dialog class="top-control-dropdown" for="top-control-widgets">
                Bulk Data
                <button data-widget-type="table">Table</button>
                <button data-widget-type="graph">Graph</button>
                <button data-widget-type="info">Team Info</button>
                <div class="dropdown-pause"></div>
                Team Info
                <button data-widget-type="media">Team Media</button>
                <button data-widget-type="comments">Team Comments</button>
                <button data-widget-type="matches">Team Matches</button>
            </dialog>

            <button id="top-control-layout" class="dropdown-button">Layout</button>
            <dialog class="top-control-dropdown" for="top-control-layout">
                <button class="top-save-layout">Save Layout</button>
                <button class="top-load-layout">Load Layout</button>
            </dialog>

            <div style="flex-grow: 1"></div>

            <button id="top-documentation" disabled>Documentation</button>
            <button id="top-patch-notes" disabled>Patch Notes</button>
            <button id="top-credits" disabled>Credits</button>
        </div>

        <h1 class="tool-name">Orpheus</h1>
    </div>

    <div class="content">

    </div>

    <footer>
        <span class="version"></span>
        <div style="flex-grow: 1"></div>
        <a href="https://www.thebluealliance.com/donate">Powered by The Blue Alliance</a>
        <div style="width: 1rem"></div>
        <a href="https://www.desmos.com/">Created with the Desmos API, used with permission from Desmos Studio PBC.</a>
        <div style="width: 1rem"></div>
        <a href="https://www.statbotics.io/">Thanks to Statbotics</a>
    </footer>

    <div class="edit-columns hidden">

    </div>

    <div class="context-menu" hidden>
        <div class="context-menu-options">

        </div>
        <div class="context-menu-themes">
            <button class="context-theme" onclick="changeThemeTo('light')"><span class="material-symbols-outlined">light_mode</span></button>
            <button class="context-theme" onclick="changeThemeTo('dark')"><span class="material-symbols-outlined">dark_mode</span></button>
            <button class="context-theme" onclick="changeThemeTo('4915')"><img src="images/spartronics.jpg" alt="Spartronics Mode"></button>
        </div>
    </div>

    <div class="notebook-stars hidden">

    </div>

    <div id="loading">
        <div id="loading-text">Loading...</div>
        <div id="loading-status"></div>
    </div>
</body>
</html>
